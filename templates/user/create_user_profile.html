<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
  {% include "components/html_headers.html" %}
    <title>Create Your Profile</title>
</head>
<body>
    {% include "components/topbar.html" %}
  <main>
    <section class="section">
<h1>Create Your Profile</h1>
<p>Complete your  profile before appling jobs.</p>
        <div class="">
<form action="{{ url_for('user.create_user_profile') }}" class="form-card-post-job" method="POST" enctype="multipart/form-data">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Full Name</label><br>
    <input type="text" name="name" placeholder="Full Name" required><br><br>

    <label>Linked In</label><br>
    <input type="url" name="linkedin" placeholder="https://linkedin.com"><br><br>

    <lable>Git Hub</lable>
    <input type="url" name="github" placeholder="https://github.com"><br><br>
  
    <label>Location</label><br>
    <input type="text" name="location" placeholder="Bengaluru, India" required><br><br>

    <label>Bio</label><br>
    <textarea
        name="bio"
        rows="6"
        placeholder="Describe your profession , skills, hobies etv..."
        maxlength="1000"></textarea><br><br>

    <button type="submit" class="btn btn-primary">
        Create Profile
    </button>

</form>
        </div>
</section>
</main>
</body>
</html>
