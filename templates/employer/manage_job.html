<!DOCTYPE html>

<html>
<head>
  {% include "components/html_headers.html" %}
  <title>Manage Jobs</title>
</head>
<body>
  {% include "components/topbar.html" %}
  {% include "components/welcome_section_arg.html" %}
  <section class="job-sections">
    <aside class="filters">
    <h2 >Filters</h2>
    <form action="{{ url_for('emp.manage_job') }}" method="GET">
     
      <div class="filter-form-group">
      <label>Job Location</label>
      <input class="search2" type="text" name="location" value="{{ filters.location }}" placeholder="e.g. Noida">
      </div>
      <div class="filter-form-group">
      <label>Job Mode</label>
      <select name="job_mode">
        <option value="" {% if not filters.job_mode %}selected{% endif %}>Any</option>
        <option value="Full_Time" {% if filters.job_mode=="Full_Time" %}selected{% endif %}>Full Time</option>
        <option value="Part_Time" {% if filters.job_mode=="Part_Time" %}selected{% endif %}>Part Time</option>
        <option value="Remote" {% if filters.job_mode=="Remote" %}selected{% endif %}>Remote</option>
        <option value="Internship" {% if filters.job_mode=="Internship" %}selected{% endif %}>Internship</option>
      </select>
      </div>
      <div class="filter-form-group">
        <label>Minimum Salary</label>
        <select name="min_salary">
          <option value="" {% if not filters.min_salary %}selected{% endif %}>Any</option>
          <option value="20000" {% if filters.min_salary=="20000" %}selected{% endif %}>20k+</option>
          <option value="30000" {% if filters.min_salary=="30000" %}selected{% endif %}>30k+</option>
          <option value="40000" {% if filters.min_salary=="40000" %}selected{% endif %}>40k+</option>
          <option value="50000" {% if filters.min_salary=="50000" %}selected{% endif %}>50k+</option>
          <option value="80000" {% if filters.min_salary=="80000" %}selected{% endif %}>80k+</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary">Apply Filter</button>
    </form>
  </aside>
    
    <div class="job-list" >
      {% for job in jobs %}
      {% include "employer/manage_job_card.html" %} 
      {% else %}
      <p>No jobs found </p>
      
      {% endfor %}
    </div>
  </section>
  
<script>

document.addEventListener("DOMContentLoaded", () => {
    const buttons = document.querySelectorAll(".menu-btn");

    buttons.forEach(btn => {
        btn.addEventListener("click", (event) => {
            // Prevent the click from immediately bubbling up to the document
            event.stopPropagation(); 
            
            // Find the parent job-card container, then locate the menu inside it
            const card = btn.closest(".job-card");
            const menu = card.querySelector(".job-menu");
            
            // Close any other open menus on the page first
            document.querySelectorAll(".job-menu.show").forEach(openMenu => {
                if (openMenu !== menu) {
                    openMenu.classList.remove("show");
                }
            });

            // Toggle the target menu
            menu.classList.toggle("show");
        });
    });

    // Close any active menu if the user clicks anywhere outside of it
    document.addEventListener("click", () => {
        document.querySelectorAll(".job-menu.show").forEach(menu => {
            menu.classList.remove("show");
        });
    });
});

</script>
</body>
</html>
